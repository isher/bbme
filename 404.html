<script>
// 加载搜索索引
let searchIndex = [];

async function loadSearchIndex() {
  try {
    const res = await fetch('/search-index.json');
    searchIndex = await res.json();
    console.log(`已加载 ${searchIndex.length} 篇文章用于搜索`);
  } catch (err) {
    console.error('搜索索引加载失败', err);
  }
}

// 执行搜索
function doSearch(keyword) {
  const resultBox = document.getElementById('search-result');
  resultBox.innerHTML = '';

  if (!keyword.trim()) {
    return;
  }

  const kw = keyword.toLowerCase();
  const matched = searchIndex.filter(item => {
    const title = (item.title || '').toLowerCase();
    const content = (item.content || '').toLowerCase();
    return title.includes(kw) || content.includes(kw);
  });

  if (matched.length === 0) {
    resultBox.innerHTML = '<div class="no-result">没有找到相关文章</div>';
    return;
  }

  let html = '';
  matched.forEach(item => {
    html += `
<div class="search-item">
  <a href="${item.url}" target="_blank">${item.title}</a>
  <div class="desc">${item.content.substring(0, 120)}...</div>
</div>
    `;
  });

  resultBox.innerHTML = html;
}

// 初始化
document.addEventListener('DOMContentLoaded', () => {
  loadSearchIndex();

  const input = document.getElementById('search-input');
  input.addEventListener('input', e => {
    doSearch(e.target.value);
  });
});
</script>
